<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSO OMR Tool</title>
  <link rel="stylesheet" href="libs/bootstrap.min.css" />
  <style>
    html, body { height: 100%; background: #f0f2f5; }
    #sidebar {
      width: 300px;
      min-width: 260px;
      max-width: 340px;
      background: #fff;
      border-right: 1px solid #dee2e6;
      display: flex;
      flex-direction: column;
      padding: 1.25rem;
      gap: 1rem;
      overflow-y: auto;
    }
    #main-area { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
    #app-wrapper { display: flex; height: 100vh; overflow: hidden; }

    .canvas-container {
      border: 1px solid #dee2e6;
      border-radius: 6px;
      background: #1e1e1e;
      overflow: auto;
      max-height: 520px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .canvas-container canvas {
      display: block;
      max-width: 100%;
      height: auto;
    }
    #canvas-tabs .nav-link { font-size: 0.85rem; padding: 0.25rem 0.75rem; }

    .result-row-checked    { background: rgba(25, 135, 84, 0.08); }
    .result-row-uncertain  { background: rgba(255, 193, 7, 0.12); }
    .result-row-empty      { background: rgba(220, 53, 69, 0.06); }

    .badge-checked   { background: #198754; }
    .badge-uncertain { background: #ffc107; color: #000; }
    .badge-empty     { background: #dc3545; }

    #progress-bar-wrap { display: none; }
    #error-alert { display: none; }
    #warning-alert { display: none; }
    #results-section { display: none; }
    #debug-section { display: none; }

    .confidence-bar {
      height: 6px;
      border-radius: 3px;
      background: #e9ecef;
      overflow: hidden;
    }
    .confidence-fill { height: 100%; border-radius: 3px; }

    .logo-title { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.02em; color: #0d6efd; }
    .logo-sub   { font-size: 0.72rem; color: #6c757d; margin-top: -2px; }

    #debug-log {
      font-size: 0.75rem;
      font-family: monospace;
      background: #1e1e1e;
      color: #d4d4d4;
      border-radius: 6px;
      padding: 0.75rem;
      max-height: 220px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    #debug-log .log-info  { color: #9cdcfe; }
    #debug-log .log-warn  { color: #ffc107; }
    #debug-log .log-error { color: #f48771; }
    #debug-log .log-ok    { color: #4ec9b0; }

    .upload-drop {
      border: 2px dashed #0d6efd44;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      padding: 1rem;
      text-align: center;
    }
    .upload-drop:hover, .upload-drop.drag-over {
      background: #0d6efd0d;
      border-color: #0d6efd;
    }
    .upload-drop input[type=file] { display: none; }
    .upload-drop .upload-icon { font-size: 1.8rem; color: #0d6efd88; }
    .upload-drop .upload-text { font-size: 0.82rem; color: #6c757d; margin-top: 0.25rem; }
    .upload-filename { font-size: 0.82rem; color: #0d6efd; font-weight: 600; word-break: break-all; }
  </style>
</head>
<body>
<div id="app-wrapper">

  <!-- ═══════════════════════════════ SIDEBAR ═══════════════════════════════ -->
  <div id="sidebar">

    <div>
      <div class="logo-title">PSO OMR Tool</div>
      <div class="logo-sub">Local-First Optical Mark Recognition</div>
    </div>

    <hr class="my-0" />

    <!-- PDF Upload -->
    <div>
      <label class="form-label fw-semibold mb-1" style="font-size:0.85rem;">PDF Document</label>
      <div class="upload-drop" id="upload-drop" onclick="document.getElementById('pdf-input').click()">
        <div class="upload-icon">📄</div>
        <div class="upload-text">Click or drag &amp; drop a PDF</div>
        <input type="file" id="pdf-input" accept="application/pdf" />
      </div>
      <div id="pdf-filename" class="upload-filename mt-1" style="display:none;"></div>
    </div>

    <!-- Template -->
    <div>
      <label class="form-label fw-semibold mb-1" style="font-size:0.85rem;">Template</label>
      <select class="form-select form-select-sm" id="template-select">
        <option value="">— Select built-in template —</option>
        <option value="template">template.json</option>
        <option value="phqd">phqd.json</option>
      </select>
      <div class="mt-1" style="font-size:0.75rem; color:#6c757d;">or upload custom:</div>
      <input type="file" class="form-control form-control-sm mt-1" id="template-input" accept="application/json" />
      <div id="template-filename" class="upload-filename mt-1" style="display:none;"></div>
    </div>

    <!-- Options -->
    <div>
      <label class="form-label fw-semibold mb-1" style="font-size:0.85rem;">Options</label>
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="debug-toggle" />
        <label class="form-check-label" style="font-size:0.82rem;" for="debug-toggle">Debug Overlay</label>
      </div>
      <div class="form-check form-switch mt-1">
        <input class="form-check-input" type="checkbox" id="calibrate-toggle" />
        <label class="form-check-label" style="font-size:0.82rem;" for="calibrate-toggle">Baseline Calibration</label>
      </div>
    </div>

    <!-- Actions -->
    <div class="d-grid gap-2">
      <button class="btn btn-primary btn-sm" id="process-btn" disabled>
        <span id="process-btn-text">Process PDF</span>
      </button>
      <button class="btn btn-outline-success btn-sm" id="export-btn" disabled>Export JSON</button>
      <button class="btn btn-outline-secondary btn-sm" id="reset-btn">Reset</button>
    </div>

    <!-- Progress -->
    <div id="progress-bar-wrap">
      <div class="d-flex justify-content-between mb-1">
        <span style="font-size:0.75rem;" id="progress-label">Processing…</span>
        <span style="font-size:0.75rem;" id="progress-pct">0%</span>
      </div>
      <div class="progress" style="height:6px;">
        <div class="progress-bar progress-bar-striped progress-bar-animated"
             id="progress-bar" role="progressbar" style="width:0%"></div>
      </div>
    </div>

    <!-- Alerts -->
    <div id="error-alert" class="alert alert-danger py-2 px-3 mb-0" style="font-size:0.8rem;"></div>
    <div id="warning-alert" class="alert alert-warning py-2 px-3 mb-0" style="font-size:0.8rem;"></div>

    <div class="mt-auto" style="font-size:0.7rem; color:#adb5bd;">
      Runs 100% offline in your browser. No data is sent anywhere.
    </div>
  </div>

  <!-- ═══════════════════════════════ MAIN ═══════════════════════════════ -->
  <div id="main-area">

    <!-- Canvas Tabs -->
    <div class="card shadow-sm">
      <div class="card-header d-flex justify-content-between align-items-center py-2">
        <ul class="nav nav-tabs card-header-tabs" id="canvas-tabs">
          <li class="nav-item">
            <button class="nav-link active" data-tab="original">Original Scan</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-tab="normalized">Normalized</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-tab="debug">Debug View</button>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-1">
          <button class="btn btn-outline-secondary btn-sm py-0 px-2" id="page-prev-btn"
                  style="font-size:0.8rem; display:none;" title="Previous page">&#8249;</button>
          <span id="canvas-page-info" class="text-muted" style="font-size:0.75rem; min-width:4.5rem; text-align:center;"></span>
          <button class="btn btn-outline-secondary btn-sm py-0 px-2" id="page-next-btn"
                  style="font-size:0.8rem; display:none;" title="Next page">&#8250;</button>
        </div>
      </div>
      <div class="card-body p-2">
        <div class="canvas-container" id="canvas-container">
          <canvas id="canvas-original" style="display:none;"></canvas>
          <canvas id="canvas-normalized" style="display:none;"></canvas>
          <canvas id="canvas-debug" style="display:none;"></canvas>
          <div id="canvas-placeholder" class="d-flex align-items-center justify-content-center w-100"
               style="height:320px; color:#6c757d; font-size:0.9rem;">
            Upload a PDF to begin
          </div>
        </div>
      </div>
    </div>

    <!-- Results Section -->
    <div id="results-section" class="card shadow-sm">
      <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <ul class="nav nav-tabs card-header-tabs" id="results-tabs">
          <li class="nav-item">
            <button class="nav-link active" data-rtab="questions" id="results-tab-questions">Questions</button>
          </li>
          <li class="nav-item">
            <button class="nav-link" data-rtab="scores" id="results-tab-scores">Scores</button>
          </li>
        </ul>
        <span id="results-summary" class="text-muted ms-2" style="font-size:0.78rem;"></span>
      </div>
      <div class="card-body p-0">
        <!-- Questions panel -->
        <div id="results-panel-questions">
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0" id="results-table">
              <thead class="table-light">
                <tr>
                  <th style="font-size:0.78rem; width:20%;">Question</th>
                  <th style="font-size:0.78rem; width:12%;">Value</th>
                  <th style="font-size:0.78rem; width:18%;">Status</th>
                  <th style="font-size:0.78rem; width:30%;">Field / Note</th>
                  <th style="font-size:0.78rem; width:20%;">Ratio</th>
                </tr>
              </thead>
              <tbody id="results-tbody"></tbody>
            </table>
          </div>
        </div>
        <!-- Scores panel -->
        <div id="results-panel-scores" style="display:none;">
          <div class="table-responsive">
            <table class="table table-sm table-hover mb-0" id="scores-table">
              <thead class="table-light">
                <tr>
                  <th style="font-size:0.78rem; width:32%;">Score</th>
                  <th style="font-size:0.78rem; width:14%;">Type</th>
                  <th style="font-size:0.78rem; width:18%;">Result</th>
                  <th style="font-size:0.78rem; width:36%;">Details</th>
                </tr>
              </thead>
              <tbody id="scores-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Debug Log Section -->
    <div id="debug-section" class="card shadow-sm">
      <div class="card-header py-2 d-flex justify-content-between align-items-center">
        <span class="fw-semibold" style="font-size:0.9rem;">Debug Log</span>
        <button class="btn btn-outline-secondary btn-sm py-0" id="clear-log-btn" style="font-size:0.75rem;">Clear</button>
      </div>
      <div class="card-body p-2">
        <div id="debug-log"></div>
      </div>
    </div>

  </div><!-- /main-area -->
</div><!-- /app-wrapper -->

<!-- Scripts (IIFE globals — no ES6 modules, works on file://) -->
<script src="libs/opencv.js"></script>
<script src="libs/pdf.min.js"></script>
<script src="libs/bootstrap.bundle.min.js"></script>
<script src="js/ui.js"></script>
<script src="js/template-manager.js"></script>
<script src="js/pdf-handler.js"></script>
<script src="js/image-preprocessing.js"></script>
<script src="js/marker-detector.js"></script>
<script src="js/perspective-normalizer.js"></script>
<script src="js/checkbox-detector.js"></script>
<script src="js/debug-overlay.js"></script>
<script src="js/question-processor.js"></script>
<script src="js/score-processor.js"></script>
<script src="js/app.js"></script>
</body>
</html>
